<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Happy 7th Monthsary, Mahal ❤️</title>

<!--
  ============================================================================
  HAPPY 7TH MONTHSARY — a self-contained digital love letter
  ============================================================================
  HOW TO USE THIS FILE
  1. Put a photo of the two of you in the SAME FOLDER as this HTML file
     and name it exactly:  photo.jpg
  2. Open this HTML file in any modern browser (double-click works fine).
     No internet connection and no server is required.
  3. Until you add a real photo.jpg, the page automatically draws a soft
     placeholder heart so the demo still works out of the box.

  WHAT CHANGED IN THIS FIX (the "portrait not visible" problem)
  - The old version filled the whole frame with text as one solid block,
    so the subject never emerged. That was a TONE-MAPPING issue, not a bug
    in the animation. Fixed by:
      * PERCENTILE contrast stretch (robust against a couple of stray very
        bright / very dark pixels that used to flatten the whole image).
      * A much higher default brightness threshold, so dark areas become
        real negative space instead of more text.
      * LIVE SLIDERS (Contrast / Detail) + an INVERT toggle, revealed once
        the portrait forms — so you can dial it in for YOUR photo without
        editing any code. Invert is the fix when your subject is DARKER
        than the background (e.g. a selfie against a bright wall).
  ============================================================================
-->

<style>
  :root{
    --noir: #0b0608;
    --wine: #2a0f1a;
    --wine-deep: #190810;
    --blush: #ffb8c9;
    --ember: #ff6b85;
    --rosegold: #e9b58c;
    --champagne: #f7e9d6;
    --ink: #f3e6ea;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--noir);
    color: var(--ink);
    font-family: var(--serif);
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    background:
      radial-gradient(ellipse at 50% 20%, rgba(255,140,170,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, var(--wine) 0%, var(--wine-deep) 45%, var(--noir) 80%);
    min-height: 100vh;
  }

  button{ font-family: inherit; cursor:pointer; }
  button:focus-visible{ outline: 2px solid var(--blush); outline-offset: 3px; }

  /* ============ FLOATING HEARTS ============ */
  .hearts-layer{
    position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:1;
  }
  .heart-particle{
    position:absolute; bottom:-10%;
    color: var(--ember);
    opacity:.55;
    will-change: transform, opacity;
    animation: floatUp linear forwards;
    filter: drop-shadow(0 0 6px rgba(255,107,133,.55));
  }
  @keyframes floatUp{
    0%   { transform: translate(0,0) rotate(0deg);   opacity:0; }
    10%  { opacity:.6; }
    90%  { opacity:.35; }
    100% { transform: translate(var(--drift,20px), -115vh) rotate(360deg); opacity:0; }
  }

  /* ============ LANDING PAGE ============ */
  .landing{
    position:relative; z-index:2;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding: 8vh 6vw;
  }
  .landing .eyebrow{
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--rosegold);
    opacity:.85;
    margin-bottom: 1.1rem;
  }
  .landing h1{
    font-size: clamp(1.9rem, 6vw, 3.4rem);
    line-height:1.15;
    margin: 0 0 0.9rem 0;
    font-weight: 500;
    color: var(--champagne);
    text-shadow: 0 0 18px rgba(255,184,201,0.35), 0 0 2px rgba(255,255,255,0.2);
  }
  .landing p.sub{
    font-size: clamp(0.95rem, 2.4vw, 1.1rem);
    color: var(--blush);
    opacity:.8;
    max-width: 36ch;
    margin: 0 0 2.6rem 0;
    font-style: italic;
  }

  #openBtn{
    position:relative;
    border:1px solid rgba(255,184,201,0.55);
    background: linear-gradient(180deg, rgba(255,184,201,0.14), rgba(255,107,133,0.06));
    color: var(--champagne);
    padding: 0.95rem 2.1rem;
    border-radius: 999px;
    font-size: clamp(0.95rem, 2.3vw, 1.08rem);
    letter-spacing: 0.02em;
    backdrop-filter: blur(4px);
    animation: heartbeatGlow 2.6s ease-in-out infinite;
    transition: transform .25s ease;
  }
  #openBtn:hover{ transform: translateY(-2px) scale(1.03); }
  #openBtn:active{ transform: translateY(0) scale(0.98); }
  @keyframes heartbeatGlow{
    0%, 100% { box-shadow: 0 0 14px rgba(255,107,133,0.25); }
    50%      { box-shadow: 0 0 30px rgba(255,107,133,0.55); }
  }

  /* ============ MODAL / SURPRISE OVERLAY ============ */
  #modalOverlay{
    position:fixed; inset:0; z-index:50;
    background:
      radial-gradient(ellipse at 50% 15%, rgba(255,140,170,0.08), transparent 60%),
      linear-gradient(180deg, var(--noir), var(--wine-deep) 70%, var(--noir));
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding: 7vh 5vw 6vh;
    opacity:0; visibility:hidden;
    transition: opacity .6s ease;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
  }
  #modalOverlay.open{ opacity:1; visibility:visible; }

  .modal-controls{
    position:fixed; top: max(14px, env(safe-area-inset-top)); right:16px; z-index:60;
    display:flex; gap:.5rem;
  }
  .ctrl-btn{
    border:1px solid rgba(255,233,214,0.3);
    background: rgba(20,8,13,0.55);
    color: var(--champagne);
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing:.05em;
    padding: .45rem .8rem;
    border-radius: 999px;
    opacity:.75;
    transition: opacity .2s ease, background .2s ease;
  }
  .ctrl-btn:hover{ opacity:1; background: rgba(255,107,133,0.18); }

  /* Phase 1: the typed seed line */
  #introWrap{
    width:100%; max-width: 640px;
    margin-top: 6vh;
    text-align:center;
    transition: opacity .7s ease, transform .7s ease;
  }
  #introWrap.fade-out{ opacity:0; transform: translateY(-14px) scale(.98); pointer-events:none; }

  #introText{
    font-family: var(--mono);
    font-size: clamp(1rem, 3.6vw, 1.45rem);
    line-height:1.6;
    color: var(--champagne);
    text-shadow: 0 0 12px rgba(255,184,201,0.45);
  }
  .cursor{
    display:inline-block; width: 0.55ch; margin-left:2px;
    background: var(--blush);
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* Phase 2–4: the portrait canvas */
  #canvasWrap{
    margin-top: 4vh;
    opacity:0; transform: scale(.97);
    transition: opacity .9s ease, transform .9s ease;
    display:flex; justify-content:center;
  }
  #canvasWrap.visible{ opacity:1; transform: scale(1); }
  #asciiCanvas{
    max-width: 92vw;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(255,107,133,0.12);
  }

  /* ============ LIVE TUNING PANEL (revealed after portrait forms) ============ */
  #tunePanel{
    margin-top: 1.8rem;
    width: 100%; max-width: 360px;
    background: rgba(20,8,13,0.55);
    border: 1px solid rgba(255,184,201,0.18);
    border-radius: 14px;
    padding: 1rem 1.15rem 1.15rem;
    backdrop-filter: blur(6px);
    opacity:0; transform: translateY(8px);
    transition: opacity .8s ease, transform .8s ease;
    pointer-events:none;
  }
  #tunePanel.show{ opacity:1; transform: translateY(0); pointer-events:auto; }
  #tunePanel .panel-title{
    font-family: var(--mono);
    font-size:.62rem; letter-spacing:.22em; text-transform:uppercase;
    color: var(--rosegold); opacity:.85; text-align:center;
    margin-bottom: .9rem;
  }
  .tune-row{
    display:flex; align-items:center; gap:.7rem; margin-bottom:.7rem;
  }
  .tune-row label{
    font-family: var(--mono); font-size:.7rem; letter-spacing:.04em;
    color: var(--champagne); opacity:.85; width: 4.6rem; flex:none;
  }
  .tune-row input[type="range"]{
    flex:1; accent-color: var(--ember); height: 4px; cursor:pointer;
  }
  .tune-actions{
    display:flex; gap:.5rem; margin-top:.4rem;
  }
  .tune-actions button{
    flex:1;
    border:1px solid rgba(255,233,214,0.25);
    background: rgba(255,107,133,0.10);
    color: var(--champagne);
    font-family: var(--mono); font-size:.68rem; letter-spacing:.04em;
    padding:.5rem; border-radius: 8px;
    transition: background .2s ease;
  }
  .tune-actions button:hover{ background: rgba(255,107,133,0.22); }
  .tune-toggle{
    display:flex; align-items:center; gap:.5rem; margin-bottom:.85rem;
    font-family: var(--mono); font-size:.7rem; color: var(--champagne); opacity:.85;
  }
  .tune-toggle input{ accent-color: var(--ember); width:16px; height:16px; cursor:pointer; }

  /* The closing letter */
  #finalMessage{
    margin-top: 2.4rem;
    text-align:center;
    max-width: 38ch;
    opacity:0; transform: translateY(10px);
    transition: opacity 1.6s ease, transform 1.6s ease;
    padding-bottom: 4vh;
  }
  #finalMessage.show{ opacity:1; transform: translateY(0); }
  #finalMessage p{
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.02rem, 2.6vw, 1.25rem);
    line-height:1.85;
    color: var(--champagne);
    text-shadow: 0 0 16px rgba(247,233,214,0.3);
    margin:0;
  }
  #finalMessage .heart-rule{
    color: var(--ember);
    margin-top: 1.1rem;
    letter-spacing: .4em;
    font-size: .8rem;
  }

  @media (max-width: 480px){
    .landing{ padding: 10vh 7vw; }
    #introWrap{ margin-top: 3vh; }
    .modal-controls{ right: 10px; }
    .ctrl-btn{ padding:.4rem .65rem; font-size:.68rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .heart-particle, #openBtn{ animation: none !important; }
    .cursor{ animation: none !important; opacity:1; }
  }
</style>
</head>
<body>

  <!-- ======================== LANDING PAGE ======================== -->
  <main class="landing" id="landing">
    <div class="hearts-layer" id="landingHearts" aria-hidden="true"></div>

    <p class="eyebrow">a small, slow surprise</p>
    <h1>Happy 7th Monthsary,<br>Mahal ❤️</h1>
    <p class="sub">Before you scroll past this — open it. It only takes a minute, and it's for you.</p>

    <button id="openBtn">Open My Surprise ❤️</button>
  </main>

  <!-- ======================== MODAL / SURPRISE ======================== -->
  <div id="modalOverlay" role="dialog" aria-label="Monthsary surprise" aria-modal="true">
    <div class="hearts-layer" id="modalHearts" aria-hidden="true"></div>

    <div class="modal-controls">
      <button class="ctrl-btn" id="skipBtn" aria-label="Skip animation">Skip ▶</button>
      <button class="ctrl-btn" id="closeBtn" aria-label="Close">✕</button>
    </div>

    <!-- Phase 1: the seed line -->
    <div id="introWrap">
      <span id="introText"></span><span class="cursor" id="cursor">&nbsp;</span>
    </div>

    <!-- Phase 2–4: the portrait -->
    <div id="canvasWrap">
      <canvas id="asciiCanvas" aria-label="A portrait formed entirely out of the words of this message"></canvas>
    </div>

    <!-- Live tuning: appears once the portrait forms -->
    <div id="tunePanel" aria-label="Adjust how the portrait looks">
      <div class="panel-title">tune the portrait ❤</div>
      <label class="tune-toggle">
        <input type="checkbox" id="invertToggle">
        Invert (use if the face is darker than the background)
      </label>
      <div class="tune-row">
        <label for="contrastRange">Contrast</label>
        <input type="range" id="contrastRange" min="100" max="320" value="200">
      </div>
      <div class="tune-row">
        <label for="detailRange">Detail</label>
        <input type="range" id="detailRange" min="0" max="100" value="42">
      </div>
      <div class="tune-actions">
        <button id="replayBtn">▶ Replay animation</button>
      </div>
    </div>

    <!-- Closing letter -->
    <div id="finalMessage">
      <p>Thank you for being part of my life.<br>
         Happy 7th Monthsary, Mahal.<br>
         I love you always. ❤️</p>
      <div class="heart-rule">❤ ❤ ❤</div>
    </div>
  </div>

<script>
/* ============================================================================
   ALL BEHAVIOUR LIVES IN THIS ONE SCRIPT BLOCK — no build step, no backend.
   ============================================================================ */

(() => {
  "use strict";

  /* ---------------- 1. CONFIG & UTILITIES ---------------- */

  const PHRASE = "Happy 7th Monthsary, Mahal. I Love You \u2764\uFE0F ";

  const reduceMotion = window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const isMobile = window.innerWidth < 560;

  const SCATTER_WINDOW = 1200;
  const FORM_WINDOW    = 1000;
  const FADE_IN_DUR    = 380;
  const FILL_WINDOW    = 1400;
  const SCATTER_ALPHA  = 0.45;

  // These are now LIVE-TUNABLE via the on-screen sliders. The values below
  // are just sensible starting points that carve out real negative space
  // (the old defaults of 0.16 / 1.7 produced the "solid block" you saw).
  let SKIP_THRESHOLD = 0.40;   // cells dimmer than this become empty space
  let DITHER_SPAN    = 0.18;   // soft probabilistic band just above the threshold
  let CONTRAST_BOOST = 2.0;    // S-curve strength around the midtones
  let INVERT         = false;  // flip light/dark (for dark-subject-on-light-bg photos)

  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  const rand = (a, b) => a + Math.random() * (b - a);

  /* ---------------- 2. FLOATING HEARTS ---------------- */
  function spawnHeart(container, { faint = false } = {}) {
    if (reduceMotion) return;
    const span = document.createElement("span");
    span.className = "heart-particle";
    span.textContent = "❤";
    const size = rand(10, isMobile ? 18 : 24);
    const left = rand(2, 96);
    const duration = rand(9, 16);
    const drift = rand(-60, 60);
    span.style.left = left + "vw";
    span.style.fontSize = size + "px";
    span.style.opacity = faint ? 0.18 : 0.5;
    span.style.setProperty("--drift", drift + "px");
    span.style.animationDuration = duration + "s";
    container.appendChild(span);
    setTimeout(() => span.remove(), duration * 1000 + 200);
  }
  function startHeartLoop(container, intervalMs, opts) {
    if (reduceMotion) return () => {};
    const id = setInterval(() => spawnHeart(container, opts), intervalMs);
    return () => clearInterval(id);
  }

  /* ---------------- 3. TYPEWRITER (Phase 1) ---------------- */
  let typeTimer = null;
  function startTypewriter(text, el, onDone) {
    el.textContent = "";
    let i = 0;
    const step = () => {
      i++;
      el.textContent = text.slice(0, i);
      if (i < text.length) {
        const lastChar = text[i - 1];
        let delay = rand(45, 95);
        if (lastChar === "," || lastChar === ".") delay += 260;
        typeTimer = setTimeout(step, delay);
      } else if (onDone) onDone();
    };
    typeTimer = setTimeout(step, 300);
  }
  function finishTypewriterInstantly(text, el) {
    clearTimeout(typeTimer);
    el.textContent = text;
  }

  /* ---------------- 4. IMAGE BRIGHTNESS SAMPLING ---------------- */

  function computeGrid(imgW, imgH) {
    const fontSize = isMobile ? 6.5 : 8.5;
    const cellW = fontSize * 0.6;
    const cellH = fontSize * 1.12;

    const widthBudget = Math.min(window.innerWidth * 0.88, isMobile ? 340 : 520);
    let cols = Math.floor(widthBudget / cellW);
    let rows = Math.round(cols * (imgH / imgW) * (cellW / cellH));

    const heightBudget = window.innerHeight * 0.56;
    const hardCapCols = isMobile ? 64 : 96;
    const hardCapRows = isMobile ? 96 : 130;

    const scale = Math.min(
      1,
      heightBudget / (rows * cellH || 1),
      hardCapCols / cols,
      hardCapRows / rows
    );
    cols = Math.max(20, Math.round(cols * scale));
    rows = Math.max(20, Math.round(rows * scale));

    return { cols, rows, cellW, cellH, fontSize };
  }

  // Reads back a RAW 0..1 luminance value per cell. We keep this raw copy
  // around so the sliders can re-process it instantly without re-decoding
  // the photo every time.
  function sampleBrightnessFromImage(img, grid) {
    const off = document.createElement("canvas");
    off.width = grid.cols;
    off.height = grid.rows;
    const octx = off.getContext("2d", { willReadFrequently: true });
    octx.drawImage(img, 0, 0, grid.cols, grid.rows);

    const { data } = octx.getImageData(0, 0, grid.cols, grid.rows);
    const out = new Float32Array(grid.cols * grid.rows);
    for (let i = 0; i < grid.cols * grid.rows; i++) {
      const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
      out[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    }
    return out;
  }

  // ===== THE KEY FIX =====
  // Old code stretched between the single darkest & single brightest pixel,
  // so one stray highlight/shadow flattened everything into the midtones and
  // the portrait became a solid block. Instead we stretch between the 5th and
  // 95th PERCENTILES (robust to outliers), then apply an S-curve and optional
  // invert. Returns a fresh array so the raw copy stays untouched.
  function processBrightness(raw) {
    const n = raw.length;
    const sorted = Float32Array.from(raw).sort();
    const lo = sorted[Math.floor(n * 0.05)];
    const hi = sorted[Math.floor(n * 0.95)];
    const range = (hi - lo) || 1;

    const out = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      let v = clamp((raw[i] - lo) / range, 0, 1);          // robust contrast stretch
      v = clamp((v - 0.5) * CONTRAST_BOOST + 0.5, 0, 1);   // S-curve around midtones
      if (INVERT) v = 1 - v;                                // dark-subject support
      out[i] = v;
    }
    return out;
  }

  function heartFallbackBrightness(grid) {
    const out = new Float32Array(grid.cols * grid.rows);
    for (let r = 0; r < grid.rows; r++) {
      for (let c = 0; c < grid.cols; c++) {
        const x = (c / (grid.cols - 1) - 0.5) * 2.6;
        const y = -((r / (grid.rows - 1) - 0.5) * 2.6) - 0.15;
        const f = Math.pow(x * x + y * y - 1, 3) - x * x * y * y * y;
        let b = 0;
        if (f <= 0) {
          const d = Math.sqrt(x * x + (y + 0.25) * (y + 0.25));
          b = clamp(1.1 - d * 0.42, 0.45, 1);
        }
        out[r * grid.cols + c] = b;
      }
    }
    return out;
  }

  function loadPhotoAndSample() {
    return new Promise((resolve) => {
      const img = new Image();
      let settled = false;

      const useFallback = () => {
        if (settled) return;
        settled = true;
        const grid = computeGrid(1, 1.2);
        const raw = heartFallbackBrightness(grid);
        resolve({ grid, raw, isFallback: true });
      };

      img.onload = () => {
        if (settled) return;
        settled = true;
        const grid = computeGrid(img.naturalWidth || 1, img.naturalHeight || 1);
        try {
          const raw = sampleBrightnessFromImage(img, grid);
          resolve({ grid, raw, isFallback: false });
        } catch (err) {
          console.warn("Could not read photo.jpg pixels, using fallback heart.", err);
          const raw = heartFallbackBrightness(grid);
          resolve({ grid, raw, isFallback: true });
        }
      };
      img.onerror = useFallback;
      img.src = "photo.jpg";
      setTimeout(useFallback, 2500);
    });
  }

  /* ---------------- 5. PARTICLE SYSTEM (Phase 2 → 4) ---------------- */

  function buildParticles(grid, brightness, opts = {}) {
    const animate = opts.animate !== false; // false => snap straight to formed
    const particles = [];
    let phraseIndex = 0;
    const canvasW = grid.cols * grid.cellW;
    const canvasH = grid.rows * grid.cellH;
    const ditherCutoff = SKIP_THRESHOLD + DITHER_SPAN;

    for (let r = 0; r < grid.rows; r++) {
      for (let c = 0; c < grid.cols; c++) {
        const b = brightness[r * grid.cols + c];

        if (b < SKIP_THRESHOLD) continue; // true negative space

        // Soft dithered edge in the band just above the threshold.
        if (b < ditherCutoff) {
          const p = (b - SKIP_THRESHOLD) / DITHER_SPAN; // 0..1 across the band
          if (Math.random() > p) continue;
        }

        const ch = PHRASE[phraseIndex % PHRASE.length];
        phraseIndex++;

        const targetX = c * grid.cellW + grid.cellW / 2;
        const targetY = r * grid.cellH + grid.cellH / 2;
        const alphaTarget = Math.pow(b, 0.8);
        const floatSeed = Math.random() * Math.PI * 2;

        if (animate && Math.random() < 0.65) {
          particles.push({
            kind: "scatter",
            ch, brightness: b, alphaTarget, floatSeed,
            targetX, targetY,
            startX: Math.random() * canvasW,
            startY: Math.random() * canvasH,
            appearDelay: rand(0, SCATTER_WINDOW),
            moveDelay: SCATTER_WINDOW + 150 + rand(0, FORM_WINDOW),
            moveDuration: rand(800, 1400),
          });
        } else {
          particles.push({
            kind: "fill",
            ch, brightness: b, alphaTarget, floatSeed,
            targetX, targetY,
            appearDelay: animate ? SCATTER_WINDOW + FORM_WINDOW + 200 + rand(0, FILL_WINDOW) : 0,
          });
        }
      }
    }
    return particles;
  }

  function brightnessToColor(b) {
    const r = Math.round(lerp(232, 255, b));
    const g = Math.round(lerp(120, 238, b));
    const bl = Math.round(lerp(150, 214, b));
    return `rgb(${r},${g},${bl})`;
  }

  /* ---------------- 6. ORCHESTRATION ---------------- */

  const landing = document.getElementById("landing");
  const openBtn = document.getElementById("openBtn");
  const modalOverlay = document.getElementById("modalOverlay");
  const closeBtn = document.getElementById("closeBtn");
  const skipBtn = document.getElementById("skipBtn");
  const introWrap = document.getElementById("introWrap");
  const introText = document.getElementById("introText");
  const canvasWrap = document.getElementById("canvasWrap");
  const canvas = document.getElementById("asciiCanvas");
  const ctx = canvas.getContext("2d");
  const finalMessage = document.getElementById("finalMessage");
  const landingHearts = document.getElementById("landingHearts");
  const modalHearts = document.getElementById("modalHearts");

  const tunePanel = document.getElementById("tunePanel");
  const invertToggle = document.getElementById("invertToggle");
  const contrastRange = document.getElementById("contrastRange");
  const detailRange = document.getElementById("detailRange");
  const replayBtn = document.getElementById("replayBtn");

  const SEED_LINE = "Happy 7th Monthsary, Mahal. I Love You \u2764\uFE0F";

  let particles = [];
  let rafId = null;
  let stopHeartLoopLanding = null;
  let stopHeartLoopModal = null;

  let currentGrid = null;
  let rawBrightness = null; // kept so sliders can re-process instantly

  const MONO_FONT = (getComputedStyle(document.documentElement)
    .getPropertyValue("--mono") || "monospace").trim();

  let state = freshState();
  function freshState() {
    return {
      formationStarted: false,
      skipped: false,
      messageShown: false,
      panelShown: false,
      phase2Start: 0,
      stopped: false,
      canvasCSSWidth: 0,
      canvasCSSHeight: 0,
    };
  }

  function resetState() {
    state = freshState();
    particles = [];
    introText.textContent = "";
    introWrap.classList.remove("fade-out");
    introWrap.style.opacity = "";
    canvasWrap.classList.remove("visible");
    finalMessage.classList.remove("show");
    tunePanel.classList.remove("show");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (rafId) cancelAnimationFrame(rafId);
  }

  function sizeCanvas(grid) {
    const cssW = grid.cols * grid.cellW;
    const cssH = grid.rows * grid.cellH;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.canvasCSSWidth = cssW;
    state.canvasCSSHeight = cssH;
  }

  function renderLoop(now) {
    const t = now - state.phase2Start;
    ctx.clearRect(0, 0, state.canvasCSSWidth, state.canvasCSSHeight);
    ctx.font = `${currentGrid.fontSize}px ${MONO_FONT}`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(255,150,180,0.55)";
    ctx.shadowBlur = isMobile ? 0 : 3;

    let allSettled = true;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      let x, y, alpha;
      const bob = reduceMotion ? 0 : Math.sin(now / 900 + p.floatSeed) * 0.6;

      if (state.skipped) {
        x = p.targetX; y = p.targetY; alpha = p.alphaTarget;
      } else if (p.kind === "scatter") {
        if (t < p.appearDelay) {
          alpha = 0; x = p.startX; y = p.startY; allSettled = false;
        } else if (t < p.appearDelay + FADE_IN_DUR) {
          const k = (t - p.appearDelay) / FADE_IN_DUR;
          alpha = lerp(0, SCATTER_ALPHA, k); x = p.startX; y = p.startY; allSettled = false;
        } else if (t < p.moveDelay) {
          alpha = SCATTER_ALPHA; x = p.startX; y = p.startY + (reduceMotion ? 0 : Math.sin(now / 600 + p.floatSeed) * 1.4);
          allSettled = false;
        } else if (t < p.moveDelay + p.moveDuration) {
          const k = easeInOutCubic((t - p.moveDelay) / p.moveDuration);
          x = lerp(p.startX, p.targetX, k);
          y = lerp(p.startY, p.targetY, k);
          alpha = lerp(SCATTER_ALPHA, p.alphaTarget, k);
          allSettled = false;
        } else {
          x = p.targetX; y = p.targetY + bob; alpha = p.alphaTarget;
        }
      } else { // fill
        if (t < p.appearDelay) {
          alpha = 0; x = p.targetX; y = p.targetY; allSettled = false;
        } else if (t < p.appearDelay + FADE_IN_DUR) {
          const k = (t - p.appearDelay) / FADE_IN_DUR;
          alpha = lerp(0, p.alphaTarget, k); x = p.targetX; y = p.targetY; allSettled = false;
        } else {
          x = p.targetX; y = p.targetY + bob; alpha = p.alphaTarget;
        }
      }

      if (alpha > 0.01) {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = brightnessToColor(p.brightness);
        ctx.fillText(p.ch, x, y);
      }
    }
    ctx.globalAlpha = 1;

    if (allSettled && !state.messageShown) {
      state.messageShown = true;
      setTimeout(() => finalMessage.classList.add("show"), 500);
      revealPanel();
    }

    if (!state.stopped) rafId = requestAnimationFrame(renderLoop);
  }

  function revealPanel() {
    if (state.panelShown) return;
    state.panelShown = true;
    setTimeout(() => tunePanel.classList.add("show"), 300);
  }

  function beginPortraitFormation() {
    if (state.formationStarted) return;
    state.formationStarted = true;

    introWrap.classList.add("fade-out");
    canvasWrap.classList.add("visible");

    loadPhotoAndSample().then(({ grid, raw }) => {
      currentGrid = grid;
      rawBrightness = raw;
      sizeCanvas(grid);
      particles = buildParticles(grid, processBrightness(raw), { animate: true });
      state.phase2Start = performance.now();
      if (!rafId) rafId = requestAnimationFrame(renderLoop);
    });
  }

  // Re-process the SAME photo with current slider values and snap the
  // portrait to its formed state instantly (no re-decoding, no re-animation).
  function retuneSnap() {
    if (!rawBrightness || !currentGrid) return;
    particles = buildParticles(currentGrid, processBrightness(rawBrightness), { animate: false });
    state.skipped = true;
    state.phase2Start = performance.now();
    if (!rafId && !state.stopped) rafId = requestAnimationFrame(renderLoop);
  }

  // Replay the full scatter→form animation with current slider values.
  function replayAnimation() {
    if (!rawBrightness || !currentGrid) return;
    state.skipped = false;
    state.messageShown = false;
    finalMessage.classList.remove("show");
    particles = buildParticles(currentGrid, processBrightness(rawBrightness), { animate: true });
    state.phase2Start = performance.now();
    if (!rafId && !state.stopped) rafId = requestAnimationFrame(renderLoop);
  }

  /* ----- Slider wiring ----- */
  invertToggle.addEventListener("change", () => {
    INVERT = invertToggle.checked;
    retuneSnap();
  });
  contrastRange.addEventListener("input", () => {
    CONTRAST_BOOST = contrastRange.value / 100; // 1.00 .. 3.20
    retuneSnap();
  });
  detailRange.addEventListener("input", () => {
    // More "Detail" = lower threshold = more text included.
    // Map 0..100 → threshold 0.62 (sparse) .. 0.18 (dense).
    SKIP_THRESHOLD = lerp(0.62, 0.18, detailRange.value / 100);
    retuneSnap();
  });
  replayBtn.addEventListener("click", replayAnimation);

  function openModal() {
    resetState();
    landing.setAttribute("aria-hidden", "true");
    modalOverlay.classList.add("open");
    document.body.style.overflow = "hidden";
    stopHeartLoopModal = startHeartLoop(modalHearts, 1800, { faint: true });

    startTypewriter(SEED_LINE, introText, () => {
      setTimeout(beginPortraitFormation, 900);
    });
  }

  function closeModal() {
    modalOverlay.classList.remove("open");
    landing.removeAttribute("aria-hidden");
    document.body.style.overflow = "";
    state.stopped = true;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    clearTimeout(typeTimer);
    if (stopHeartLoopModal) stopHeartLoopModal();
  }

  function skipToEnd() {
    finishTypewriterInstantly(SEED_LINE, introText);
    state.skipped = true;
    if (!state.formationStarted) {
      beginPortraitFormation();
    }
    if (!state.messageShown) {
      state.messageShown = true;
      finalMessage.classList.add("show");
      revealPanel();
    }
  }

  openBtn.addEventListener("click", openModal);
  closeBtn.addEventListener("click", closeModal);
  skipBtn.addEventListener("click", skipToEnd);

  stopHeartLoopLanding = startHeartLoop(landingHearts, 1400, { faint: false });
})();
</script>
</body>
</html>
